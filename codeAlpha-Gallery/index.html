<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu Gallery</title>
<style>

/* Reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#f4f4f4;
text-align:center;
}

/* Heading */
h3{
font-size:30px;
margin:20px 0;
letter-spacing:1px;
}

/* Gallery */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
gap:20px;
width:95%;
margin:auto;
}

/* Card */
.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
cursor:pointer;
transition:0.3s;
padding:10px;
}

.card:hover{
transform:translateY(-5px);
}

/* Image (IMPORTANT FIX: FULL MENU VISIBLE) */
.gallery-img{
width:100%;
height:auto;
object-fit:contain; /* ensures FULL image shows */
border-radius:8px;
}

/* Viewer */
.viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:1000;
flex-direction:column;
}

/* Viewer Image */
.viewer img{
max-width:95%;
max-height:85%;
object-fit:contain; /* FULL menu visible */
border-radius:10px;
}

/* Close button */
.close{
position:absolute;
top:20px;
right:25px;
font-size:35px;
color:#fff;
cursor:pointer;
}

/* Viewer Navigation (inside popup) */
.viewer .navigation{
position:absolute;
top:50%;
width:100%;
display:flex;
justify-content:space-between;
transform:translateY(-50%);
}

.viewer button{
font-size:35px;
padding:15px;
background:rgba(0,0,0,0.5);
color:white;
border:none;
cursor:pointer;
border-radius:50%;
margin:10px;
}

.viewer button:hover{
background:#777;
}

/* Page Navigation (outside viewer) */
.page-nav{
position:fixed;
top:50%;
width:100%;
display:flex;
justify-content:space-between;
transform:translateY(-50%);
z-index:999;
}

.nav-btn{
font-size:35px;
padding:15px;
background:rgba(0,0,0,0.6);
color:white;
text-decoration:none;
border-radius:50%;
margin:10px;
}

.nav-btn:hover{
background:#555;
}

/* Mobile */
@media (max-width:768px){

h3{
font-size:24px;
}

.viewer button{
font-size:28px;
padding:10px;
}

.nav-btn{
font-size:28px;
padding:10px;
}

}

</style>

</head>

<body style="background-color: rgba(243, 234, 103, 0.89);">

<h3>OUR MENU</h3>

<!-- Gallery -->
<section class="gallery">

<div class="card">
<img src="Burger-Menu.png" class="gallery-img" onclick="openViewer(0)">
</div>

<div class="card">
<img src="PIZZA-Menu.png" class="gallery-img" onclick="openViewer(1)">
</div>

<div class="card">
<img src="Sandwich-wrap.png" class="gallery-img" onclick="openViewer(2)">
</div>

</section>

<!-- Viewer -->
<div class="viewer" id="viewer">

<span class="close" onclick="closeViewer()">×</span>

<img id="mainImage">

<div class="navigation">
<button onclick="prevImage()">&#10094;</button>
<button onclick="nextImage()">&#10095;</button>
</div>

</div>

<!-- Page Navigation -->
<div class="page-nav">
<a href="desert.html" class="nav-btn">&#10094;</a>
<a href="desert.html" class="nav-btn">&#10095;</a>
</div>

<script>

let images = [
"Burger-Menu.png",
"PIZZA-Menu.png",
"Sandwich-wrap.png"
];

let current = 0;

function openViewer(index){
current = index;
document.getElementById("viewer").style.display = "flex";
showImage();
}

function showImage(){
document.getElementById("mainImage").src = images[current];
}

function nextImage(){
current = (current + 1) % images.length;
showImage();
}

function prevImage(){
current = (current - 1 + images.length) % images.length;
showImage();
}

function closeViewer(){
document.getElementById("viewer").style.display = "none";
}

</script>

</body>
</html>
