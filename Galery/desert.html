<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dessert Menu</title>

<style>
body{
font-family: 'Poppins', sans-serif;
}

h2, h3{
font-family: 'Pacifico', cursive;
}
/* Reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#f4f4f4;
text-align:center;
}

/* Heading */
h2{
font-size:30px;
margin:20px 0;
letter-spacing:1px;
}

/* Gallery */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
gap:20px;
width:95%;
margin:auto;
}

/* Card */
.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
padding:10px;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-6px) scale(1.02);
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* Image (FULL VIEW) */
.gallery-img{
width:100%;
height:auto;
object-fit:contain; /* important */
border-radius:8px;
}

/* Navigation Buttons */
.navigation{
position:fixed;
top:50%;
width:100%;
display:flex;
justify-content:space-between;
transform:translateY(-50%);
z-index:1000;
}

.nav-btn{
font-size:35px;
padding:15px;
background:rgba(0,0,0,0.6);
color:white;
text-decoration:none;
border-radius:50%;
margin:10px;
transition:0.3s;
}

.nav-btn:hover{
background:#555;
transform:scale(1.1);
}

/* Mobile */
@media (max-width:768px){

h2{
font-size:24px;
}

.nav-btn{
font-size:28px;
padding:10px;
}

}

</style>

</head>

<body style="background-color: plum">

<h2 style="color: palevioletred;"> DESSERT </h2>

<section class="gallery">

<div class="card">
<img src="Desi-Desert.png" class="gallery-img">
</div>

<div class="card">
<img src="Cake-pasteries-menu.png" class="gallery-img">
</div>

<div class="card">
<img src="Detox-Juices.png" class="gallery-img">
</div>

</section>

<!-- Navigation -->
<div class="navigation">
<a href="index.html" class="nav-btn">&#10094;</a>
<a href="index.html" class="nav-btn">&#10095;</a>
</div>

</body>
</html>
